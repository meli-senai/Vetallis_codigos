<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vetallis - Cadastrar</title>

    <!-- Folha de estilos personalizada do projeto -->
    <link rel="stylesheet" href="/static/style.css">

    <!-- Bootstrap 5 para layout e componentes responsivos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons para os ícones dos campos do formulário -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body id="body-cadastro">

    <!-- Container principal centralizado na tela -->
    <div class="container d-flex align-items-center justify-content-center cadastro-container">

        <!-- Logo da aplicação exibida como imagem sobreposta ao fundo -->
        <img src="/static/imagens/vetalis_branca_sem_fundo.png" alt="logo" class="logo">

        <!-- Card central que contém todo o conteúdo da página de cadastro -->
        <div class="cadastro-card text-center">

            <!-- Título e subtítulo da página -->
            <h2 class="mb-3 mt-4 text-white"><strong>VETALLIS</strong></h2>
            <p class="text-white text-uppercase font-weight-bold">Cadastre-se</p>

            <!-- Exibe mensagens de feedback (erro ou sucesso) enviadas via flash do Flask -->
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for categoria, mensagem in messages %}
            <!-- A categoria define a cor do alerta: 'danger' para erro, 'success' para sucesso -->
            <div class="alert alert-{{ categoria }} text-center w-75 mx-auto" role="alert">
                {{ mensagem }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <!-- Formulário de cadastro enviado via POST para a rota /usuario/salvar -->
            <form method="POST" class="form-container d-flex justify-content-center flex-column" action="/usuario/salvar">

                <!-- Campo: Nome -->
                <div class="mb-2 text-start input-centro">
                    <label class="form-label text-white">Nome</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-secundary">
                            <i class="bi bi-person-circle text-white"></i>
                        </span>
                        <input type="text" name="nome" class="dados_formulario" placeholder="Digite seu nome" required>
                    </div>
                </div>

                <!-- Campo: Email -->
                <div class="mb-2 text-start">
                    <label class="form-label text-white">Email</label>
                    <div class="input-group d-flex justify-content-center">
                        <span class="input-group-text bg-transparent border-secundary">
                            <i class="bi bi-envelope-at text-white"></i>
                        </span>
                        <input type="email" name="email" class="dados_formulario" placeholder="Digite seu email" required>
                    </div>
                </div>

                <!-- Campo: CPF -->
                <div class="mb-2 text-start">
                    <label class="form-label text-white">CPF</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-secundary">
                            <i class="bi bi-person-badge text-white"></i>
                        </span>
                        <input type="text" name="cpf" class="dados_formulario" placeholder="Digite seu CPF" required>
                    </div>
                </div>

                <!-- Campo: Senha -->
                <div class="mb-2 text-start">
                    <label class="form-label text-white">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-secundary">
                            <i class="bi bi-key text-white"></i>
                        </span>
                        <input type="password" name="senha" class="dados_formulario" placeholder="Crie uma senha" required>
                    </div>
                </div>

                <!-- Campo: Cargo -->
                <div class="mb-2 text-start">
                    <label class="form-label text-white">Cargo</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-secundary">
                            <i class="bi bi-patch-check text-white"></i>
                        </span>
                        <input type="text" name="cargo" class="dados_formulario" placeholder="Insira seu cargo." required>
                    </div>
                </div>

                <!-- Botão de envio do formulário -->
                <button class="btn btn-cadastro w-50 text-white mt-4"
                    style="background: #03c356; border-radius: 25px;"
                    type="submit" id="botao-cadastro">Cadastrar</button>

            </form>

            <!-- Link para voltar à página de login -->
            <div class="d-flex justify-content-center">
                <a class="btn-voltar-login text-white mt-2 d-flex justify-content-center"
                    style="text-decoration: none;"
                    href="{{ url_for('novo_login') }}">Voltar Para Login</a>
            </div>

            <!-- Rodapé com copyright -->
            <div class="mt-4 mb-4 text-white" style="font-size:13px;">
                &copy;VETALLIS - Gerenciamento de estoque
            </div>

        </div>
    </div>

</body>
</html>
