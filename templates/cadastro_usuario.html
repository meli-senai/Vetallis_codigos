<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

</head>

<body>
    <div class="container d-flex align-items-center justify-content-center cadastro-container">
        <img src="/static/imagens/vetalis_branca_sem_fundo.png" alt="logo" class="logo">
        <div class=" cadastro-card text-center ">
            <h2 class="mb-1 mt-4 text-white "><strong>VETALLIS</strong></h2>
            <p class=" mb-0 text-white  text-uppercase font-weight-bold">Cadastre-se</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for categoria, mensagem in messages %}
            <div class="alert alert-{{ categoria }} text-center w-75 mx-auto" role="alert">
                {{ mensagem }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}
            <form method="POST" class="form-container" action="/usuario/salvar">
                <div class="mb-2 text-start input-centro ">
                    <label class="form-label text-white">Nome</label>
                    <div class="input-group ">
                        <span class="input-group-text bg-transparent border-secundary">
                            <i class="bi bi-person-circle text-white"></i>
                        </span>
                        <input type="text" name="nome" class="dados_formulario " placeholder="Digite seu nome" required>
                    </div>
                </div>
                <div class="mb-2 text-start">
                    <label class="form-label text-white">Email</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-secundary">
                            <i class="bi bi-envelope-at text-white"></i>
                        </span>
                        <input type="email" name="email" class="dados_formulario" placeholder="Digite seu email"
                            required>
                    </div>
                </div>
                <div class="mb-2 text-start">
                    <label class="form-label text-white">CPF</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-secundary">
                            <i class="bi bi-person-badge text-white"></i>
                        </span>
                        <input type="text" name="cpf" class="dados_formulario" placeholder="Digite seu CPF" required>
                    </div>
                </div>
                <div class="mb-2 text-start">
                    <label class="form-label text-white">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-secundary">
                            <i class="bi bi-key text-white"></i>
                        </span>
                        <input type="password" name="senha" class="dados_formulario" placeholder="Crie uma senha"
                            required>
                    </div>
                </div>
                <div class="mb-2 text-start">
                    <label class="form-label text-white">Confirmar de senha</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-secundary">
                            <i class="bi bi-key-fill text-white"></i>
                        </span>
                        <input type="password" name="confirmar_senha" class="dados_formulario" placeholder="Confirme sua senha"
                            required>
                    </div>
                </div>
                <div class="mb-2 text-start">
                    <label class="form-label text-white">Cargo</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-secundary">
                            <i class="bi bi-patch-check text-white"></i>
                        </span>
                        <input type="text" name="cargo" class="dados_formulario" placeholder="Insira seu cargo."
                            required>
                    </div>
                </div>

                <button class="btn btn-cadastro w-50 text-white mt-2" style=" background: #03c356; border-radius: 25px;"
                    type="submit" id="botao-cadastro">Cadastrar</button>

            </form>
            <div class="d-flex justify-content-center">
                <a class=" btn-voltar-login text-white mt-2 d-flex justify-content-center"
                    style="text-decoration: none;" href="{{ url_for('novo_login') }}">Voltar para login</a>
            </div>
                <div class=" mt-2  mb-2 text-white " style="font-size:13px;">
                    ©VETALLIS - Gerenciamento de estoque
                </div>
        </div>

    </div>

</body>

</html>
