<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vetallis - Login</title>

    <!-- Folha de estilos personalizada do projeto -->
    <link rel="stylesheet" href="/static/style.css">

    <!-- Bootstrap 5 para layout e componentes responsivos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons para os ícones dos campos do formulário -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Fonte Inter importada do Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <!-- Container principal centralizado na tela -->
        <div class="container d-flex align-items-center justify-content-center login-container">

            <!-- Logo exibida sobre o card de login -->
            <img src="/static/imagens/vetalis_branca_sem_fundo.png" alt="logo vetallis" class="logo">

            <!-- Card central com o formulário de login -->
            <div class="login-card text-center">
                <h4 class="mb-3 text-white">Sistema de Estoque</h4>
                <p class="mb-4 text-white">Acesse sua conta</p>

                <!-- Exibe mensagens de feedback (erro ou sucesso) enviadas via flash do Flask -->
                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                {% for categoria, mensagem in messages %}
                <!-- A categoria define a cor do alerta: 'danger' para erro, 'success' para sucesso -->
                <div class="alert alert-{{ categoria }} text-center w-75 mx-auto" role="alert">
                    {{ mensagem }}
                </div>
                {% endfor %}
                {% endif %}
                {% endwith %}

                <!-- Formulário de login enviado via POST para a rota /login/salvar -->
                <form method="POST" action="/login/salvar">

                    <!-- Campo: Email -->
                    <div class="mb-3 text-start">
                        <label class="form-label text-white">Email</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-white">
                                <i class="bi bi-person-fill text-white"></i>
                            </span>
                            <input type="email" name="email" class="form-control"
                                placeholder="Digite seu email" required>
                        </div>
                    </div>

                    <!-- Campo: Senha -->
                    <div class="mb-3 text-start">
                        <label class="form-label text-white">Senha</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-white">
                                <i class="bi bi-lock-fill text-white"></i>
                            </span>
                            <input type="password" name="senha" class="form-control"
                                placeholder="Digite sua senha" required>
                        </div>
                    </div>

                    <!-- Checkbox "Lembre-me" (funcionalidade ainda não implementada no backend) -->
                    <input type="checkbox" name="" id="" class="form-label align-items-center">
                    <label for="lembrar" class="text-white align-items-center mb-2">Lembre-me</label>

                    <!-- Botão de envio do formulário -->
                    <button class="btn btn-login w-100 text-white mt-2 mb-2"
                        style="background: #03c356; border-radius: 25px;"
                        type="submit">Entrar</button>

                    <!-- Link de recuperação de senha (ainda sem destino definido) -->
                    <a class="btn-esqueceu-senha text-white mt-4"
                        style="text-decoration: none;">Esqueceu a senha</a>

                    <!-- Link para a página de cadastro, gerado via Flask -->
                    <a href="{{ url_for('novo_usuario') }}"
                        class="text-white text-decoration-none d-flex justify-content-center">
                        <span id="botao-cadastro">Cadastre-se</span>
                    </a>

                </form>

                <!-- Rodapé com copyright -->
                <div class="mt-4 text-white" style="font-size:13px;">
                    &copy; 2026 Vetallis - Sistema de Estoque
                </div>
            </div>
        </div>
    </main>
</body>
</html>
