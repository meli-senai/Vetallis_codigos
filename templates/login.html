<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Fonte moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <main>
        <div class="container d-flex  align-items-center justify-content-center login-container">
            <img src="/static/imagens/vetalis_branca_sem_fundo.png" alt="logo vetallis" class="logo">
            <div class="login-card text-center ">

                <h4 class="mb-3 text-white">Sistema de Estoque</h4>
                <p class="mb-4 text-white">Acesse sua conta</p>

                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                {% for categoria, mensagem in messages %}
                <div class="alert alert-{{ categoria }} text-center w-75 mx-auto" role="alert">
                    {{ mensagem }}
                </div>
                {% endfor %}
                {% endif %}
                {% endwith %}

                <form method="POST" action="/login/salvar">
                    <div class="mb-3 text-start">
                        <label class="form-label text-white">Email</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-white">
                                <i class="bi bi-person-fill text-white"></i>
                            </span>
                            <input type="email" name="email" class="form-control" placeholder="Digite seu email"
                                required>
                        </div>
                    </div>

                    <div class="mb-3 text-start">
                        <label class="form-label text-white">Senha</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-white">
                                <i class="bi bi-lock-fill text-white"></i>
                            </span>
                            <input type="password" name="senha" class="form-control" placeholder="Digite sua senha"
                                required>
                        </div>
                    </div>
                    <input type="checkbox" name="" id="" class="form-label align-items-center "><label for="lemabrar"
                        class="text-white align-items-center mb-2 "> Lembre-me </label>
                    <button class="btn btn-login w-100 text-white mt-2 mb-2"
                        style=" background: #03c356; border-radius: 25px;" type="submit">Entrar</button>
                    <a class=" btn-esqueceu-senha text-white mt-4" style="text-decoration: none;">Esqueceu a senha</a>
                    <a href="{{ url_for('novo_usuario') }}"
                        class="text-white text-decoration-none d-flex justify-content-center">
                        <span id="botao-cadastro">Cadastre-se</span>
                    </a>

                </form>

                <div class="mt-4 text-white " style="font-size:13px;">
                    © 2026 Vetallis - Sistema de Estoque
                </div>
            </div>
        </div>
    </main>
</body>

</html>
